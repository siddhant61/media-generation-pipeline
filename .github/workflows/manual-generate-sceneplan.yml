name: Manual Generate ScenePlan

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      downstream_artifact_name:
        description: >
          Name of the downstream handoff artifact to download from an earlier
          job in the same orchestration run.  When provided, the workflow
          downloads this artifact and uses it as the input handoff directory
          instead of the committed demo_data fixture.
        required: false
        type: string
        default: ''
      upstream_run_id:
        description: >
          Explicit upstream run ID for provenance tracking.  Recorded in the
          RunManifest as handoff_source_run_id when provided, supplementing
          (or overriding) the source_run_id found in the downloaded
          handoff_manifest.json.
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  generate-sceneplan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          repository: siddhant61/media-generation-pipeline

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimum dependencies
        run: |
          python -m pip install --upgrade pip
          # The non-API-gated handoff path uses only Python stdlib modules.
          # No external pip packages are required for stable output generation.

      - name: Download downstream handoff artifact
        if: inputs.downstream_artifact_name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.downstream_artifact_name }}
          path: downloaded_handoff/

      - name: Determine input path and mode
        id: resolve-input
        run: |
          if [ -d "downloaded_handoff" ] && [ "$(ls -A downloaded_handoff 2>/dev/null)" ]; then
            echo "input_path=downloaded_handoff" >> "$GITHUB_OUTPUT"
            echo "mode=orchestration" >> "$GITHUB_OUTPUT"
            echo "::notice ::Using downloaded handoff artifact as input (orchestration mode)"
            ls -la downloaded_handoff/
          else
            echo "input_path=demo_data/jwst_star_formation_early_universe_demo/" >> "$GITHUB_OUTPUT"
            echo "mode=fixture" >> "$GITHUB_OUTPUT"
            echo "::notice ::Using committed demo fixture as input (manual mode)"
          fi

      - name: Generate stable outputs
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ inputs.upstream_run_id }}" ]; then
            EXTRA_ARGS="--upstream-run-id ${{ inputs.upstream_run_id }}"
          fi
          python generate_scene_plan.py \
            "${{ steps.resolve-input.outputs.input_path }}" \
            --media-package --stable-output --validate \
            $EXTRA_ARGS

      - name: Validate ScenePlan, MediaPackage, and RunManifest
        run: |
          OUTPUT_DIR=$(find outputs/ -mindepth 1 -maxdepth 1 -type d | head -1)
          if [ -z "$OUTPUT_DIR" ] || [ ! -d "$OUTPUT_DIR" ]; then
            echo "ERROR: No output directory found under outputs/" >&2
            exit 1
          fi
          echo "Validating artifacts in: $OUTPUT_DIR"
          echo "Mode: ${{ steps.resolve-input.outputs.mode }}"
          python validate_artifacts.py "$OUTPUT_DIR"

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scene-plan-outputs
          path: outputs/
          if-no-files-found: warn
